<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피부유형 판별 학습 시스템</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-bounce { animation: bounce 1s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            50% { transform: translateY(0); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
        }
        .quiz-container { min-height: 500px; }
    </style>
</head>
<body class="bg-pink-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트 유틸리티
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // 피드백 캐릭터 컴포넌트
        const UpdoCharacter = ({ isCorrect }) => (
            <div className="absolute top-[45%] right-2 md:right-8 flex flex-col items-center z-50 pointer-events-none transition-all duration-500 transform -translate-y-1/2 opacity-100">
                <div className={`relative px-5 py-3 rounded-2xl shadow-2xl border-2 font-black text-lg md:text-xl whitespace-nowrap mb-2 animate-bounce ${isCorrect ? 'bg-white border-pink-400 text-pink-600' : 'bg-slate-800 border-slate-600 text-white'}`}>
                    {isCorrect ? "그렇지~~~ 잘했어! ✨" : "아~~~니~~~ 💢"}
                    <div className={`absolute -bottom-2.5 right-1/2 translate-x-1/2 w-5 h-5 border-b-2 border-r-2 transform rotate-45 ${isCorrect ? 'bg-white border-pink-400' : 'bg-slate-800 border-slate-600'}`}></div>
                </div>
                <svg width="140" height="140" viewBox="0 0 130 130" className="drop-shadow-2xl">
                    <defs>
                        <linearGradient id="naraeHair" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style={{stopColor:'#795548', stopOpacity:1}} /><stop offset="100%" style={{stopColor:'#4E342E', stopOpacity:1}} /></linearGradient>
                        <linearGradient id="naraeSkin" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style={{stopColor:'#FFF3E0', stopOpacity:1}} /><stop offset="100%" style={{stopColor:'#FFE0B2', stopOpacity:1}} /></linearGradient>
                    </defs>
                    <circle cx="65" cy="75" r="32" fill="url(#naraeHair)" />
                    <circle cx="65" cy="80" r="28" fill="url(#naraeSkin)" stroke="#FFCC80" strokeWidth="1"/>
                    <circle cx="65" cy="52" r="20" fill="url(#naraeHair)" stroke="#3E2723" strokeWidth="1" />
                    <path d="M 55 58 Q 65 65 75 58" stroke="#3E2723" strokeWidth="1" fill="none" opacity="0.3" />
                    <g>
                        {isCorrect ? (
                            <>
                                <circle cx="53" cy="80" r="4" fill="#3E2723" /><circle cx="77" cy="80" r="4" fill="#3E2723" />
                                <circle cx="51" cy="78" r="1.5" fill="white" /><circle cx="75" cy="78" r="1.5" fill="white" />
                                <path d="M 58 92 Q 65 98 72 92" stroke="#D81B60" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <ellipse cx="48" cy="88" rx="6" ry="3" fill="#FFAB91" opacity="0.8" /><ellipse cx="82" ry="3" rx="6" cy="88" fill="#FFAB91" opacity="0.8" />
                            </>
                        ) : (
                            <>
                                <path d="M 48 72 L 58 76" stroke="#3E2723" strokeWidth="2" strokeLinecap="round" /><path d="M 72 76 L 82 72" stroke="#3E2723" strokeWidth="2" strokeLinecap="round" />
                                <path d="M 50 82 Q 53 78 56 82" stroke="#3E2723" strokeWidth="2.5" fill="none" strokeLinecap="round" /><path d="M 74 82 Q 77 78 80 82" stroke="#3E2723" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <path d="M 58 96 Q 65 88 72 96" stroke="#D81B60" strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                <ellipse cx="48" cy="88" rx="5" ry="2" fill="#90A4AE" opacity="0.3" /><ellipse cx="82" cy="88" rx="5" ry="2" fill="#90A4AE" opacity="0.3" />
                            </>
                        )}
                    </g>
                    <path d="M 58 68 Q 65 72 72 68" stroke="#FBC02D" strokeWidth="2" fill="none" />
                </svg>
            </div>
        );

        const App = () => {
            const [mode, setMode] = useState('home');
            const [difficulty, setDifficulty] = useState('EASY');
            const [questions, setQuestions] = useState([]);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [answerStatus, setAnswerStatus] = useState(null); 
            const [quizFinished, setQuizFinished] = useState(false);
            const [showHint, setShowHint] = useState(false);

            const rawData = [
                // --- EASY 질문 및 해설 ---
                { difficulty: 'EASY', answer: '정상피부', text: '적당한 수분과 유분을 가지고 있어 피부표면이 촉촉하고 매끄럽고 윤기가 있다.', explanation: '정상피부는 피지선과 한선의 기능이 원활하여 유수분 밸런스가 가장 이상적인 상태입니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '세안 후 당기거나 번들거림이 없다.', explanation: '피부 보호막이 건강하여 세안 후에도 즉각적인 항상성을 유지하기 때문입니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '화장이 잘 지워지지 않으며, 오래 지속된다.', explanation: '적절한 피지량과 수분이 화장품의 밀착력을 높여주는 최적의 조건을 갖추고 있습니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '모공이 작아 눈에 잘 보이지 않고, 피부탄력이 좋다.', explanation: '피부 결이 섬세하고 진피층의 탄력 섬유가 잘 발달되어 모공이 조밀해 보입니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '피부의 수분 함유량이 12% 정도이며 촉촉하다.', explanation: '정상 피부 각질층의 표준 수분 함량은 12~13%로, 이 수치는 건강한 보습력을 상징합니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '20대 초반에 많이 나타나는 피부로 피지선이 활발하고 원활하며 윤기가 흐른다.', explanation: '신진대사가 가장 활발한 연령대에서 보이는 가장 이상적인 피부 유형입니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '볼 주위에는 핑크빛 혈색을 보이며 코에 약간 블랙 헤드가 있다.', explanation: '전체적인 순환은 좋으나 T존 부위의 생리적인 피지 분비로 인해 코에 블랙헤드가 소량 존재할 수 있습니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '혈액순환이 잘되어 혈색이 좋으나 T-zone은 약간 번들거림이 있다.', explanation: '맑은 혈색은 순환의 증거이며, T존의 약한 번들거림은 정상적인 피지 활동 범위에 해당합니다.' },
                { difficulty: 'EASY', answer: '정상피부', text: '피부결이 섬세하고 윤기가 있다.', explanation: '건성피부와 달리 유수분이 조화로워 결이 고우면서도 표면에 건강한 광택이 흐릅니다.' },

                { difficulty: 'EASY', answer: '건성피부', text: '모공이 작고 윤기가 없으며 각질이 일어난다.', explanation: '피지 분비가 부족하여 피부를 보호하는 기름막이 형성되지 않아 푸석하고 각질이 생깁니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '외관상 괜찮아 보이지만, 화장이 들뜨고 갈라 진다.', explanation: '피부 표면이 메마른 상태라 화장품 입자가 흡수되지 못하고 겉돌며 균열이 생기는 현상입니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '소릉과 소구 높이 차이가 거의 없으며 선명 하지 않다.', explanation: '피부가 얇아지고 위축되면서 피부 결의 굴곡(소릉과 소구)이 밋밋해지는 노화의 전조 증상입니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '각질층의 수분이 10%이하이고 눈 주위 잔주름이 보인다.', explanation: '수분 10% 이하는 건성 피부의 전형적인 수치이며, 얇은 눈가부터 수분 부족형 주름이 생깁니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '접촉 피부염이 발생 하기 쉬운 편이며 피부에 저항력이 약한상태이다.', explanation: '피지막이 얇아 외부 자극이나 세균 침입을 막아낼 저항력이 크게 떨어져 있기 때문입니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '순환이 잘 안 되며 피부 표면에 윤기가 없고 푸석푸석하다.', explanation: '혈액 순환과 영양 공급이 원활하지 않아 피부 대사가 정체된 상태를 나타냅니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '피부가 손상되기 쉬워 색소침착에 의한 기미, 주근깨가 생기기 쉽고 노화현상이 빨리온다.', explanation: '보호막이 없는 무방비 상태에서 자외선 등 외부 자극을 받으면 멜라닌 생성이 가속화됩니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '민감피부가 되거나 노화가 빨리 진행된다.', explanation: '지속적인 건조함은 피부 장벽을 파괴하여 민감성으로 변화시키고 탄력을 앗아갑니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '눈에 잔 주름이 두드러져 보일뿐아니라 부분적으로 하얀 각질이 일어나고 심하면 버짐이 생긴다.', explanation: '수분이 극도로 결핍되면 각질 탈락이 원활하지 못해 표면이 갈라지며 버짐 현상이 나타납니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '세안 후 당김은 없으나 시간이 지나면서 당김이 있고 버짐이 생긴다.', explanation: '후발성 당김은 공기 중으로 수분을 빼앗기는 것을 막아줄 유분이 부족하다는 명확한 증거입니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '모공이 작으며 피부결이 섬세해 보이나 윤기가 없고 항상 긴장 되고 있다.', explanation: '섬세해 보이지만 수분 부족으로 인해 피부가 팽팽하게 당겨져 스트레스를 받는 상태입니다.' },
                { difficulty: 'EASY', answer: '건성피부', text: '모공이 작고 피부가 얇으며, 피부결이 섬세해 보인다.', explanation: '피지샘 활동이 적어 모공은 거의 보이지 않지만 조직 자체가 얇아 연약한 결을 가집니다.' },

                { difficulty: 'EASY', answer: '지성피부', text: '피부결이 거칠고 피부가 두꺼운 편이며, 잔주름이 잘 나타나지 않는다.', explanation: '풍부한 피지가 수분 증발을 막아 주름은 늦게 생기지만, 각질이 비후해져 결은 거칠어집니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피부표면이 늘 번들거리며, 피지과다분비로 모공이 크고 불규칙하다.', explanation: '많은 양의 피지를 배출하기 위해 배출구인 모공이 확장되어 크고 불규칙하게 변합니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '메이크업이 쉽게 지워지고 지속되지 못한다.', explanation: '피지의 오일 성분이 화장품의 고정력을 약화시켜 화장을 녹여내기 때문입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '소릉과 소구가 뚜렷하고 피부가 번들 거린다. / 소구와 소릉의 높이차가 심하며 각질층이 두껍다.', explanation: '과다 피지와 쌓인 각질로 인해 피부 굴곡이 커지고 번들거리는 지성 피부의 전형적인 결입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '면포와 뾰루지가 관찰 되며, 각질층이 두껍고 모공이 늘어져 있다.', explanation: '피지가 모공을 막아 염증이 생기기 쉬우며 늘어진 모공 주위로 트러블이 발생합니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피부 과각화 현상이 있으며 코에 블랙 헤드가 많고 깊은 주름이 있다.', explanation: '각질이 두껍게 쌓이면서 모공 속 피지가 산화되어 검게 변하고 조직이 두꺼워 굵은 주름이 생깁니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '윤기와 탄력이 있어 잔주름이 없는 편이고, 저항력이 강하고 노화가 느리게 진행된다.', explanation: '천연 보호막 역할을 하는 피지가 외부 자극을 차단하고 수분을 지켜 노화를 지연시킵니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피지 분비량이 많으나 당김이 심하고 피부가 예민하고 표피 박리가 쉽게 일어난다.', explanation: '유분은 많으나 내부 수분이 부족한 복합적 상태로, 일명 "수분 부족형 지성"을 뜻합니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피지분비량은 많으나 보습 기능이 저하 되어 당김 현상이 있다.', explanation: '피지 막만으로는 해결되지 않는 내부 보습 인자의 결핍으로 인해 속당김이 발생하는 상태입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '산화가 진행되고 있으며 피부가 칙칙하다.', explanation: '표면의 피지가 공기와 만나 산화되면서 안색이 노랗거나 어둡게 변해 칙칙해 보입니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피지분비가 많아 피부표면이 번들거리고 끈적이며 먼지가 잘 붙는다.', explanation: '점성이 있는 피지 성분이 대기 중 오염 물질이나 먼지를 피부 표면에 쉽게 달라붙게 만듭니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '세안 후 당김은 없으나 시간이 지나면서 피부가 번들거린다.', explanation: '피지 샘의 활동이 매우 활발하여 세안 직후의 상쾌함이 오래가지 못하고 금세 유분이 올라옵니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피부가 두껍고 표면이 귤껍질처럼 보이며 메이크업이 잘 지워진다.', explanation: '확장된 모공과 두꺼운 각질층이 결합하여 마치 귤껍질 같은 울퉁불퉁한 질감을 형성합니다.' },
                { difficulty: 'EASY', answer: '지성피부', text: '피부색이 전체적으로 칙칙하거나 모세혈관이 확장되어 붉은색을 띠기 쉽다.', explanation: '두꺼운 각질로 칙칙해 보이거나 잦은 염증 반응으로 인해 붉은기가 동반되는 경우가 많습니다.' },

                // --- HARD 질문 및 해설 ---
                { difficulty: 'HARD', answer: '지성피부', text: '피부 과각화 현상이 있으며 코에 블랙 헤드가 많고 깊은 주름이 있다.', explanation: '과도한 각질 비후와 피지 산화는 지성 피부에서 나타나는 심화된 노화 증상입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '산화가 진행되고 있어 블랙 헤드가 많다.', explanation: '피지 배출량이 많을수록 공기와의 접촉이 늘어나 블랙헤드 형성이 두드러지게 나타납니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피부가 두껍고 표면이 귤껍질처럼 보이며 메이크업이 잘 지워진다.', explanation: '모공 주위의 조직이 피지 압력으로 인해 변형되어 거칠어진 상태를 의미합니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '각질층의 수분이 10%이하이고 눈 주위 잔주름이 보인다.', explanation: '수분 10% 미만은 피부의 유연성을 상실시켜 미세한 표정 변화에도 주름이 남게 합니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공이 작으며 피부결이 섬세해 보이나 윤기가 없고 항상 긴장 되고 있다.', explanation: '겉은 고와 보이지만 수분 부족으로 인한 당김(Tension)이 항시 지속되는 건조 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '피부결이 섬세하고 윤기가 있다.', explanation: '가장 조화로운 피부 상태로, 결이 고우면서도 건강한 광택이 공존하는 이상적 모습입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '혈액순환이 잘되어 혈색이 좋으나 T-zone은 약간 번들거림이 있다.', explanation: '건강한 안색은 양호한 대사를 증명하며, 자연스러운 T존 피지는 정상 피부에서도 나타납니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피부표면이 늘 번들거리며, 피지과다분비로 모공이 크고 불규칙하다.', explanation: '피지 배출 통로인 모공이 과부하를 받아 입구가 넓어지고 모양이 일그러진 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '메이크업이 쉽게 지워지고 지속되지 못한다.', explanation: '오일 베이스인 화장품이 피부에서 뿜어져 나오는 유분에 의해 밀려나는 현상입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '소구와 소릉의 높이차가 심하며 각질층이 두껍다.', explanation: '각질이 겹겹이 쌓여 피부 표면이 아주 투박하고 거칠게 발달한 상태를 설명합니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '세안 후 당김은 없으나 시간이 지나면서 피부가 번들거린다.', explanation: '피지 재생 속도가 빨라 세안 직후의 보습 상태가 유분에 의해 금방 덮이게 됩니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '20대 초반에 많이 나타나는 피부로 피지선이 원활하며 윤기가 흐른다.', explanation: '피부 생리기능이 최고조에 달하여 결점이 거의 없는 최상의 컨디션을 설명합니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '산화가 느리게 진행되며 피지분비량이 많다.', explanation: '절대적인 피지 분비량 자체가 많은 것이 지성 피부의 가장 핵심적인 정의입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '외관상 괜찮아 보이지만, 화장이 들뜨고 갈라 진다.', explanation: '피부 수분이 화장품 입자를 고정하지 못해 발생하는 건성 피부의 고질적인 문제입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '윤기와 탄력이 있어 잔주름이 없는 편이고, 저항력이 강하고 노화가 느리게 진행된다.', explanation: '피지 막이 보습력을 완벽하게 지켜주어 진피 탄력 저하를 늦춰주는 긍정적인 측면입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피부색이 전체적으로 칙칙하거나 모세혈관이 확장되어 붉은색을 띠기 쉽다.', explanation: '각질 비후와 반복되는 피지 트러블로 인해 혈관이 자극받아 예민해진 지성 타입입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '소릉과 소구 높이 차이가 거의 없으며 선명 하지 않다.', explanation: '조직의 위축으로 인해 미세 결 자체가 희미해진 고도의 건조 및 노화 상태입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '세안 후 당김은 없으나 시간이 지나면서 당김이 있고 버짐이 생긴다.', explanation: '수분 보유 능력이 떨어져 시간이 흐를수록 증발 속도가 생성 속도를 앞지르는 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '모공이 작아 눈에 잘 보이지 않고, 피부탄력이 좋다.', explanation: '진피의 지지력이 튼튼하고 모공 확장의 원인(피지 과다)이 없어 결이 매우 깨끗합니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피부결이 거칠고 피부가 두꺼운 편이며, 잔주름이 잘 나타나지 않는다.', explanation: '조직이 튼튼해 주름엔 강하지만, 피지와 각질로 인해 질감은 투박해진 특징입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피지분비량은 많으나 보습 기능이 저하 되어 당김 현상이 있다.', explanation: '유분만으로는 채워지지 않는 보습 성분의 부재로 인해 발생하는 불균형 상태입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '눈에 잔 주름이 두드러져 보일뿐아니라 부분적으로 하얀 각질이 일어나고 심하면 버짐이 생긴다.', explanation: '각질층의 심각한 붕괴로 인해 시각적인 건조 현상이 뚜렷하게 나타나는 단계입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '면포와 뾰루지가 관찰 되며, 각질층이 두껍고 모공이 늘어져 있다.', explanation: '피지 배출 지연과 오염이 결합하여 염증성 트러블로 발전한 전형적인 예입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '볼 주위에는 핑크빛 혈색을 보이며 코에 약간 블랙 헤드가 있다.', explanation: '건강한 혈색과 생리적인 범위 내의 피지 활동을 보여주는 문항입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공이 작고 피부가 얇으며, 피부결이 섬세해 보인다.', explanation: '피지 분비가 적어 모공은 곱지만 방어 장벽이 얇아 매우 예민할 수 있는 결입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피지분비가 많아 피부표면이 번들거리고 끈적이며 먼지가 잘 붙는다.', explanation: '점착성 있는 피지가 표면을 덮어 외부 오염에 취약해진 지성 상태를 설명합니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '피지 분비량이 많으나 당김이 심하고 피부가 예민하고 표피 박리가 쉽게 일어난다.', explanation: '수분 부족형 지성으로, 유분이 수분 보호막의 기능을 완전히 대체하지 못하는 경우입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '화장이 잘 지워지지 않으며, 오래 지속된다.', explanation: '피부의 유수분 함량이 가장 적절하여 화장품이 최상의 컨디션으로 안착되기 때문입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공이 작고 윤기가 없으며 각질이 일어난다.', explanation: '수분과 유분이 동시에 결핍되어 피부 본연의 빛을 잃어버린 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '소릉과 소구가 뚜렷하고 피부가 번들거린다.', explanation: '피부 결의 굴곡인 소구와 소릉이 크고 깊어 보이며 광택이 심한 지성의 특성입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '순환이 잘 안 되며 피부 표면에 윤기가 없고 푸석푸석하다.', explanation: '대사 기능이 정체되어 영양분 공급이 늦어지면서 표면이 메마르게 변한 것입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '민감피부가 되거나 노화가 빨리 진행된다.', explanation: '지속적인 건조함은 피부의 자가 회복 능력을 떨어뜨려 노화의 속도를 높입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '세안 후 당기거나 번들거림이 없다.', explanation: '피부 자정 능력이 뛰어나 세안 후에도 즉각적인 밸런스 조절이 가능한 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '피부의 수분 함유량이 12% 정도이며 촉촉하다.', explanation: '학술적으로 가장 이상적인 보습 수치를 유지하는 건강한 피부를 의미합니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '접촉 피부염이 발생 하기 쉬운 편이며 피부에 저항력이 약한상태이다.', explanation: '보호막이 소실되어 외부 물질이 쉽게 침투하여 염증을 일으키는 연약한 피부입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피부가 손상되기 쉬워 색소침착에 의한 기미, 주근깨가 생기기 쉽고 노화현상이 빨리온다.', explanation: '방어벽 부재로 인해 환경 자극에 의한 손상과 복구 불능 상태가 반복되는 과정입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '적당한 수분과 유분을 가지고 있어 피부표면이 촉촉하고 매끄럽고 윤기가 있다.', explanation: '피부미용 학문에서 정의하는 가장 전형적이고 이상적인 정상 피부의 정의입니다.' },

                { difficulty: 'HARD', answer: '지성피부', text: '과도한 피지분비로 번들거리나 세안 후 당김이 있고 표피박리가 발생한다.', explanation: '유분만 과다하고 보습 인자가 부족한 불균형적 지성 상태를 의미합니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피지선과 한선의 기능저하로 피부탄력저하 현상이 보이며 모세혈관 확장 현상이 나타나기 쉽다.', explanation: '기능 저하로 인해 피부가 얇아지면서 진피층 혈관이 비쳐 보일 만큼 예민해진 건성 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '계절적 영향을 받기도하나 주로 청소년에게 많이 발생하며 외부 물리적 자극에는 비교적 강하다.', explanation: '호르몬에 의한 피지 활성화와 두꺼운 표피층 덕분에 물리적 방어력이 높은 지성입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '코에 약간의 면포가 있으며 세안 후 당기거나 끈적이지 않는다.', explanation: '부분적인 피지 활동은 있으나 전체적인 밸런스가 매우 양호한 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '모공이 늘어지진 않으나 커서 육안으로 쉽게 구별할 수 있다.', explanation: '피지 배출량이 많아 통로인 모공 자체가 원형으로 확장된 초기 지성 특징입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공의 늘어짐이 눈에 띄고 피부당김이 내부로부터 심하게 느껴진다.', explanation: '탄력 저하로 모공이 처지면서 발생하는 "속당김"은 고도의 건조 단계에서 나타납니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피부염이 발생하기 쉬우며 피부트러블이 잘 생기고 예민하다.', explanation: '피부 장벽의 보습 능력이 상실되어 미세 자극에도 트러블이 잦은 건성 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '각질층이 두껍고 모낭염이 형성되며 피부가 거칠어진다.', explanation: '각질 비후와 세균 번식이 용이한 피지 환경이 만나 염증을 일으킨 지성 타입입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '계절의 변화에 따라 여름에 지성, 겨울에 건성화 될 수 있지만 트러블은 잘 발생하지 않는다.', explanation: '환경 변화에 유연하게 대응하며 자정 능력을 잃지 않는 건강한 상태입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '소구와 소릉의 높이차가 거의 없으며 선명하지 않다.', explanation: '피부 결이 소실될 정도로 영양과 수분이 결핍된 얇고 건조한 피부 질감입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피부염 발생이후 붉고 예민한 피부이다.', explanation: '장벽 손상으로 인해 붉은기가 고착된 후천적 건성 및 민감성 피부를 설명합니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '각질층의 수분이 10% 미만이며 화장이 잘받지 않고 들뜨기 쉽다.', explanation: '심각한 수분 부족이 화장품의 밀착을 방해하는 건성 피부의 고질적 문제점입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '세안 후 당김이 있거나 끈적임이 없으며 세균에 대한 저항감이 있다.', explanation: '피부 산성막이 완벽히 유지되어 세균 증식을 억제하는 건강한 상태를 뜻합니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '정상적인 피지 분비로 T존은 약간 번들거리며 세안 후 피부 당김이 거의 느껴지지 않는다.', explanation: '부위별 피지선 차이는 있으나 전반적으로 유수분이 조화로운 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '충분한 수분과 피지를 가지고 있으며 표정주름 이외에는 주름이 없다.', explanation: '건조에 의한 가짜 주름이 생기지 않을 만큼 보습력이 탄탄한 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '소릉과 소구의 높이차가 완만하며 수분이 적당하고 탄력이 좋은편이다.', explanation: '결이 너무 투박하지도, 얇지도 않은 완만하고 건강한 결을 갖춘 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '각질층이 비후하여 피부가 두껍게 보인다.', explanation: '피지 축적과 탈락되지 못한 각질이 층을 이루어 조직이 두터워진 지성 특징입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '각질이 잘 일어나고 피부가 둔탁해 보이며 굵은 주름이 있다.', explanation: '수분이 결여된 지성 피부는 표면은 푸석하지만 조직은 두꺼워 깊은 주름이 생깁니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '모낭염이 형성되며 피부가 거칠어진다.', explanation: '모공 오염이 심화되어 피부 결이 파괴되고 염증이 빈번한 지성 상태입니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '화장이 잘 지워지지 않고 번들거림이 없다.', explanation: '수분감이 파우더를 잘 잡아주어 번들거림 없이 오랜 시간 지속되는 상태입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피부가 윤기가 없으며 푸석푸석하고 순환이 안된다.', explanation: '순환 정체와 영양 결핍으로 인해 생기를 잃은 전형적인 건성 특징입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '모공이 작고 피부가 얇으며 외관상으로 볼때 섬세해 보이나 윤기가 없다.', explanation: '결은 곱지만 피지막이 부족해 광택이 나지 않는 건조한 피부입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '한선 및 피부보습 능력의 저하에 기인하여 피부가 거칠고 늘어져 있다.', explanation: '수분 유지력과 땀 조절 능력이 상실되어 탄력을 잃은 건성 피부의 노화 과정입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '피부결이 곱고 피부 두께가 얇으며 피부의 유연성이 부족하다.', hint: '얇고 팽팽하게 당겨진 연약한 상태입니다.', explanation: '조직이 얇아 유연하게 늘어나지 못하고 항시 긴장되어 있는 건성 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '과각화 현상이 있으며 T존 부위에 모공과 피지가 쌓여 블랙헤드 화이트헤드가 보인다.', explanation: '피지 배출 지연으로 각질이 쌓여 특정 부위에 면포가 정체된 상태입니다.' },
                { difficulty: 'HARD', answer: '지성피부', text: '메이크업이 잘지워지며 투명감이 보이지 않고 탁하다.', explanation: '유분 과잉으로 화장이 뭉치고, 칙칙한 안색이 겉으로 드러난 지성 피부입니다.' },
                { difficulty: 'HARD', answer: '건성피부', text: '각질과 소양감이 있으며 표피의 심한 건조도에 비해 늘어짐은 심하지 않다.', explanation: '심한 가려움(소양감)을 동반하는 초기 건성 및 민감성 상태를 설명합니다.' },
                { difficulty: 'HARD', answer: '정상피부', text: '소릉이 얇고 피부결이 섬세하며 탄력성이 있고 모공이 작으며 모세혈관이 붉으스름하다.', explanation: '건강한 혈색과 섬세한 결과 조밀한 모공이 조화를 이룬 정상 피부의 특징입니다.' }
            ];

            const shuffle = (array) => {
                let currentIndex = array.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            };

            const startQuiz = (level) => {
                let pool = rawData.filter(q => q.difficulty === level);
                if (pool.length < 10) {
                    const others = rawData.filter(q => q.difficulty !== level);
                    pool = [...pool, ...others];
                }
                const shuffledPool = shuffle([...pool]);
                const uniqueQuestions = [];
                const seenTexts = new Set();
                for (const q of shuffledPool) {
                    if (!seenTexts.has(q.text)) {
                        uniqueQuestions.push(q);
                        seenTexts.add(q.text);
                    }
                    if (uniqueQuestions.length === 10) break;
                }
                setQuestions(uniqueQuestions);
                setDifficulty(level);
                setMode('quiz');
                setCurrentQuestionIndex(0);
                setScore(0);
                setSelectedAnswer(null);
                setAnswerStatus(null);
                setQuizFinished(false);
                setShowHint(false);
            };

            const handleAnswer = (ans) => {
                if (selectedAnswer !== null) return;
                const isCorrect = ans === questions[currentQuestionIndex].answer;
                setSelectedAnswer(ans);
                setAnswerStatus(isCorrect ? 'correct' : 'incorrect');
                if (isCorrect) setScore(s => s + 1);
            };

            const nextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(i => i + 1);
                    setSelectedAnswer(null);
                    setAnswerStatus(null);
                    setShowHint(false);
                } else {
                    setQuizFinished(true);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                                    <Icon name="book-open" className="text-pink-600" />
                                    피부유형 판별 학습 시스템
                                </h1>
                                <p className="text-slate-500 font-medium italic">"정답의 이유를 아는 것이 진짜 실력입니다."</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setMode('home')} className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${mode === 'home' ? 'bg-pink-500 text-white shadow-md' : 'bg-white text-slate-600 border border-pink-100'}`}>홈</button>
                            </div>
                        </header>

                        {mode === 'home' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-pink-100 text-center">
                                    <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="list-checks" size={32} /></div>
                                    <h2 className="text-xl font-bold mb-2">EASY 챌린지</h2>
                                    <button onClick={() => startQuiz('EASY')} className="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl font-bold transition-all">시작하기 (10문제)</button>
                                </div>
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-pink-100 text-center">
                                    <div className="w-16 h-16 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="help-circle" size={32} /></div>
                                    <h2 className="text-xl font-bold mb-2">HARD 챌린지</h2>
                                    <button onClick={() => startQuiz('HARD')} className="w-full py-3 bg-rose-500 hover:bg-rose-600 text-white rounded-xl font-bold transition-all">시작하기 (10문제)</button>
                                </div>
                            </div>
                        )}

                        {mode === 'quiz' && !quizFinished && (
                            <div>
                                <div className="mb-6 bg-white p-4 rounded-xl shadow-sm border border-pink-100 flex items-center justify-between relative z-30">
                                    <div className="flex items-center gap-3">
                                        <span className={`px-2 py-1 rounded text-xs font-bold ${difficulty === 'EASY' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>{difficulty}</span>
                                        <span className="text-sm text-slate-500">문제 {currentQuestionIndex + 1} / {questions.length}</span>
                                    </div>
                                    <button 
                                        onClick={() => setShowHint(!showHint)}
                                        disabled={selectedAnswer !== null}
                                        className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${
                                            showHint 
                                                ? 'bg-pink-600 text-white ring-2 ring-pink-300 animate-pulse' 
                                                : 'bg-pink-100 text-pink-600 hover:bg-pink-200 hover:shadow-md'
                                        } ${selectedAnswer !== null ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    >
                                        <Icon name="lightbulb" size={16} />
                                        {showHint ? '힌트 닫기' : '힌트 보기'}
                                    </button>
                                </div>

                                <div className="bg-white p-8 rounded-2xl shadow-lg border border-pink-100 mb-6 relative quiz-container overflow-hidden">
                                    <h3 className="text-sm text-pink-400 mb-4 uppercase tracking-wider font-bold">Question</h3>
                                    <p className="text-xl md:text-2xl font-bold text-slate-800 leading-relaxed mb-8 italic relative z-10">
                                        "{questions[currentQuestionIndex].text}"
                                    </p>

                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8 relative z-10">
                                        {['정상피부', '건성피부', '지성피부'].map((choice) => {
                                            let buttonClass = "py-4 px-6 rounded-xl font-bold border-2 transition-all flex items-center justify-center gap-2 ";
                                            const isCorrect = choice === questions[currentQuestionIndex].answer;
                                            const isSelected = selectedAnswer === choice;
                                            if (selectedAnswer === null) buttonClass += "border-slate-100 bg-slate-50 hover:border-pink-300 hover:bg-white text-slate-700";
                                            else if (isSelected) buttonClass += isCorrect ? "border-emerald-500 bg-emerald-50 text-emerald-700" : "border-rose-500 bg-rose-50 text-rose-700";
                                            else if (isCorrect) buttonClass += "border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm";
                                            else buttonClass += "border-slate-100 bg-slate-50 text-slate-400 opacity-50";
                                            return (
                                                <button key={choice} onClick={() => handleAnswer(choice)} disabled={selectedAnswer !== null} className={buttonClass}>
                                                    {selectedAnswer !== null && isCorrect && <Icon name="check-circle-2" size={18} />}
                                                    {selectedAnswer === choice && !isCorrect && <Icon name="x-circle" size={18} />}
                                                    {choice}
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* 힌트 및 해설 영역 */}
                                    {showHint && selectedAnswer === null && (
                                        <div className="mb-8 p-4 bg-pink-50 border-2 border-pink-200 rounded-xl relative z-10 shadow-sm animate-in fade-in duration-300">
                                            <p className="text-base text-pink-700 leading-relaxed font-bold flex gap-2 items-start">
                                                <Icon name="lightbulb" size={20} className="shrink-0 mt-1" />
                                                <span>지문의 특징(모공 크기, 유분감, 수분 함량 등)을 다시 한번 꼼꼼히 읽어보세요!</span>
                                            </p>
                                        </div>
                                    )}

                                    {selectedAnswer !== null && (
                                        <div className="p-5 bg-pink-50 border border-pink-200 rounded-2xl relative z-10 animate-in slide-in-from-bottom-2 shadow-sm">
                                            <div className="flex items-center gap-2 text-pink-700 mb-2 font-bold">
                                                <Icon name="info" size={18} />
                                                정답의 근거 및 해설
                                            </div>
                                            <p className="text-slate-700 leading-relaxed text-sm w-full md:w-3/4">
                                                <span className="font-bold text-pink-600">[{questions[currentQuestionIndex].answer}] </span>
                                                {questions[currentQuestionIndex].explanation || "해당 문항의 상세 해설을 확인하세요."}
                                            </p>
                                        </div>
                                    )}

                                    {/* 피드백 캐릭터: 해설지를 가리지 않도록 중앙 배치 */}
                                    {answerStatus !== null && (
                                        <UpdoCharacter isCorrect={answerStatus === 'correct'} />
                                    )}
                                </div>

                                {selectedAnswer !== null && (
                                    <div className="flex justify-end">
                                        <button onClick={nextQuestion} className="flex items-center gap-2 px-8 py-3 bg-pink-500 text-white rounded-xl font-bold shadow-lg hover:bg-pink-600 transition-all">
                                            {currentQuestionIndex === questions.length - 1 ? '결과 보기' : '다음 문제'}
                                            <Icon name="chevron-right" size={20} />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {quizFinished && (
                            <div className="bg-white p-12 rounded-2xl shadow-xl border border-pink-100 text-center">
                                <div className="w-24 h-24 bg-pink-100 text-pink-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="award" size={48} /></div>
                                <h2 className="text-3xl font-bold mb-2">테스트 종료!</h2>
                                <div className="text-6xl font-black text-pink-600 mb-8">{score} / {questions.length}</div>
                                <div className="flex gap-4 justify-center">
                                    <button onClick={() => startQuiz(difficulty)} className="px-6 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold hover:bg-slate-200 transition-all flex items-center gap-2"><Icon name="rotate-ccw" size={18}/> 다시하기</button>
                                    <button onClick={() => setMode('home')} className="px-6 py-3 bg-pink-500 text-white rounded-xl font-bold hover:bg-pink-600">메인으로</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
